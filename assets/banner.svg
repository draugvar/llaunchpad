<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1e2e"/>
      <stop offset="1" stop-color="#11111b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#89b4fa"/>
      <stop offset="1" stop-color="#cba6f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#89b4fa" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#89b4fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- icon mark -->
  <g transform="translate(150,80) scale(0.195)">
    <rect x="40" y="40" width="944" height="944" rx="220" ry="220" fill="#181825"/>
    <polygon points="512,232 742,690 282,690" fill="url(#accent)" stroke="url(#accent)" stroke-width="64" stroke-linejoin="round"/>
    <rect x="392" y="752" width="240" height="36" rx="18" fill="url(#accent)"/>
    <rect x="446" y="818" width="132" height="30" rx="15" fill="#89b4fa" opacity="0.6"/>
    <rect x="476" y="878" width="72" height="26" rx="13" fill="#89b4fa" opacity="0.32"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="180" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#cdd6f4">Llaunchpad</text>
  <text x="364" y="240" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#a6adc8">Launch any Ollama agent with any cloud model — one click.</text>
</svg>
