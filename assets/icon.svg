<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#272a3d"/>
      <stop offset="1" stop-color="#15161f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#89b4fa"/>
      <stop offset="1" stop-color="#cba6f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0" stop-color="#89b4fa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#89b4fa" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="40" y="40" width="944" height="944" rx="220" ry="220" fill="url(#bg)"/>
  <!-- top inner highlight -->
  <rect x="40" y="40" width="944" height="944" rx="220" ry="220" fill="url(#glow)"/>

  <!-- launch glyph: clean rounded upward triangle -->
  <polygon points="512,232 742,690 282,690"
           fill="url(#accent)"
           stroke="url(#accent)" stroke-width="64"
           stroke-linejoin="round"/>

  <!-- launch pad / thrust bars -->
  <rect x="392" y="752" width="240" height="36" rx="18" fill="url(#accent)"/>
  <rect x="446" y="818" width="132" height="30" rx="15" fill="#89b4fa" opacity="0.6"/>
  <rect x="476" y="878" width="72"  height="26" rx="13" fill="#89b4fa" opacity="0.32"/>
</svg>
